<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>الحاسبة المطورة للعام الدراسي 1448هـ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-1: #eaf4f1;
            --bg-2: #f9f5eb;
            --card-bg: rgba(255, 255, 255, 0.92);
            --primary: #0b6b5b;
            --primary-dark: #06483e;
            --accent: #c8a96b;
            --accent-soft: #f5ebd8;
            --text: #18312c;
            --muted: #64756f;
            --border: rgba(11, 107, 91, 0.12);
            --shadow: 0 18px 45px rgba(4, 56, 48, 0.12);
            --radius-xl: 26px;
            --radius-lg: 18px;
            --success: #1f7a47;
            --info: #0f6c78;
            --kg: #9c295e;
            --middle: #1c63b7;
            --secondary: #8e6a09;
            --neutral: #546e7a;
            --danger: #455a64;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(200, 169, 107, 0.22), transparent 28%),
                radial-gradient(circle at bottom left, rgba(11, 107, 91, 0.18), transparent 32%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            overflow-x: hidden;
        }

        .page {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 14px;
        }

        .app-shell {
            width: 100%;
            max-width: 560px;
            min-height: calc(100vh - 28px);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 22px;
            padding: 12px 18px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: #fff;
            box-shadow: var(--shadow);
            animation: fadeUp 0.8s ease both;
        }

        .hero h1 {
            margin: 0;
            font-size: 1.18rem;
            line-height: 1.8;
            font-weight: 800;
            text-align: center;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: var(--radius-xl);
            padding: 18px;
            box-shadow: var(--shadow);
            animation: fadeUp 0.85s ease both;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, rgba(11, 107, 91, 0.12), rgba(200, 169, 107, 0.22));
            color: var(--primary);
            flex-shrink: 0;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--primary-dark);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 10px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.79rem;
            font-weight: 700;
            color: var(--primary-dark);
            padding-right: 4px;
        }

        select {
            width: 100%;
            min-height: 48px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fff;
            color: var(--text);
            font-family: inherit;
            font-size: 0.96rem;
            font-weight: 600;
            padding: 0 10px;
            outline: none;
            transition: transform .2s ease;
        }

        .actions { margin-top: 14px; }

        button {
            border: none;
            width: 100%;
            min-height: 52px;
            border-radius: 16px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform .18s ease;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 14px 25px rgba(11, 107, 91, 0.22);
        }

        .btn-calc {
            background: linear-gradient(135deg, #d4b57a, #b69149);
            color: #17342d;
            box-shadow: 0 14px 25px rgba(182, 145, 73, 0.22);
        }

        .result-box {
            margin-top: 14px;
            display: none;
            border-radius: 18px;
            padding: 14px;
            background: linear-gradient(135deg, #fffaf0, var(--accent-soft));
            border: 1px solid rgba(200, 169, 107, 0.36);
            color: var(--primary-dark);
            font-weight: 700;
            text-align: center;
        }

        .result-area { display: none; margin-top: 15px; }

        .stage {
            border-radius: 20px;
            padding: 22px 16px;
            color: #fff;
            text-align: center;
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: var(--primary-dark);
        }

        .footer .name { font-weight: 800; font-size: 0.95rem; }
        .footer .version { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="app-shell">
            <section class="hero">
                <h1>حاسبة أعمار طلاب الصف الأول الابتدائي ورياض الأطفال للعام الدراسي 1448 هـ</h1>
            </section>

            <section class="card">
                <div class="card-header">
                    <div class="icon-wrap">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M8 2V5M16 2V5M3 9H21M5 4H19C20.1046 4 21 4.89543 21 6V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V6C3 4.89543 3.89543 4 5 4Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div><h2>محول التاريخ الهجري إلى الميلادي</h2></div>
                </div>

                <div class="input-row">
                    <div class="field"><label>اليوم</label><select id="hDay"></select></div>
                    <div class="field"><label>الشهر</label><select id="hMonth"></select></div>
                    <div class="field"><label>السنة</label><select id="hYear"></select></div>
                </div>

                <div class="actions">
                    <button class="btn-main" onclick="convertHijri()">تحويل التاريخ وإرسال للحاسبة</button>
                </div>
                <div id="hResult" class="result-box"></div>
            </section>

            <section class="card">
                <div class="card-header">
                    <div class="icon-wrap">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 14C15.3137 14 18 11.3137 18 8C18 4.68629 15.3137 2 12 2C8.68629 2 6 4.68629 6 8C6 11.3137 8 14 12 14Z" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M4 21C4.85038 18.1085 7.17792 16 12 16C16.8221 16 19.1496 18.1085 20 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div><h2>حاسبة الصف المستحق</h2></div>
                </div>

                <div class="input-row">
                    <div class="field"><label>اليوم</label><select id="gDay"></select></div>
                    <div class="field"><label>الشهر</label><select id="gMonth"></select></div>
                    <div class="field"><label>السنة</label><select id="gYear"></select></div>
                </div>

                <div class="actions">
                    <button class="btn-calc" onclick="calculate()">احسب الصف المستحق</button>
                </div>

                <div id="resultArea" class="result-area">
                    <div id="stageOutput" class="stage"></div>
                </div>
            </section>

            <div class="footer">
                <div class="name">تصميم أ. خالد محمد الحربي® 2026</div>
                <div class="version">0504509080 | allihaibi@gmail.com</div>
                <div class="version">Version 3.4 - إصدار 1447هـ</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

    <script>
        const hijriMonths = ["محرم", "صفر", "ربيع الأول", "ربيع الآخر", "جمادى الأولى", "جمادى الآخرة", "رجب", "شعبان", "رمضان", "شوال", "ذو القعدة", "ذو الحجة"];
        const gregorianMonths = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

        window.onload = function () {
            const hDay = document.getElementById("hDay"), hMonth = document.getElementById("hMonth"), hYear = document.getElementById("hYear");
            const gDay = document.getElementById("gDay"), gMonth = document.getElementById("gMonth"), gYear = document.getElementById("gYear");

            for (let i = 1; i <= 30; i++) hDay.innerHTML += `<option value="${i}">${i}</option>`;
            hijriMonths.forEach((m, i) => hMonth.innerHTML += `<option value="${i+1}">${i+1} - ${m}</option>`);
            for (let i = 1446; i >= 1390; i--) hYear.innerHTML += `<option value="${i}">${i}</option>`;

            for (let i = 1; i <= 31; i++) gDay.innerHTML += `<option value="${i}">${i}</option>`;
            gregorianMonths.forEach((m, i) => gMonth.innerHTML += `<option value="${i+1}">${i+1} - ${m}</option>`);
            for (let i = 2027; i >= 1980; i--) gYear.innerHTML += `<option value="${i}">${i}</option>`;
        };

        function convertHijri() {
            const d = document.getElementById("hDay").value, m = document.getElementById("hMonth").value, y = document.getElementById("hYear").value;
            const date = moment(`${y}/${m}/${d}`, "iYYYY/iM/iD");
            if (!date.isValid()) return;
            document.getElementById("gDay").value = date.format("D");
            document.getElementById("gMonth").value = date.format("M");
            document.getElementById("gYear").value = date.format("YYYY");
            calculate();
        }

        function calculate() {
            const d = parseInt(document.getElementById("gDay").value), m = parseInt(document.getElementById("gMonth").value), y = parseInt(document.getElementById("gYear").value);
            const birth = new Date(y, m - 1, d);
            const target = new Date(2026, 7, 24); 

            let years = target.getFullYear() - birth.getFullYear();
            let months = target.getMonth() - birth.getMonth();
            let days = target.getDate() - birth.getDate();
            if (days < 0) { months--; days += 30; }
            if (months < 0) { years--; months += 12; }

            const stageOut = document.getElementById("stageOutput");
            document.getElementById("resultArea").style.display = "block";

            let text = "", color = "";

            const primaryLimit = new Date(2020, 7, 24); 
            const graceLimitEnd = new Date(2020, 10, 22);
            const kg3End = new Date(2021, 7, 24);
            const kg2End = new Date(2022, 7, 24);
            const kg1End = new Date(2023, 7, 24);

            if (years >= 6 && years <= 10) {
                text = "الصف الأول الابتدائي";
                color = "var(--success)";
            } else if (years > 10) {
                text = "يتم توجيه الطالب للتعليم المستمر";
                color = "var(--secondary)";
            } else if (birth > primaryLimit && birth <= graceLimitEnd) {
                text = "الأول ابتدائي (بشرط الروضة) أو رياض أطفال (KG3)";
                color = "var(--info)";
            } else if (birth > graceLimitEnd && birth <= kg3End) {
                text = "رياض الأطفال - المستوى الثالث (KG3)";
                color = "var(--kg)";
            } else if (years == 4) {
                text = "رياض الأطفال - المستوى الثاني (KG2)";
                color = "var(--kg)";
            } else if (years == 3) {
                text = "رياض الأطفال - المستوى الأول (KG1)";
                color = "var(--kg)";
            } else {
                text = "دون سن القبول";
                color = "var(--neutral)";
            }

            stageOut.style.background = color;
            stageOut.innerHTML = `<div style="font-size:1.2rem; font-weight:800">${text}</div>`;
        }
    </script>
</body>
</html>
