<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>حاسبة خاصة بطلاب الصف الأول الابتدائي ورياض الأطفال</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* التعديل الجديد للألوان */
            --bg-1: #f0f4f8;            /* خلفية فاتحة مريحة */
            --bg-2: #d9e2ec;            /* تدرج خلفية مائل للزرقة */
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary: #102a43;         /* كحلي ملكي عميق */
            --primary-dark: #051a2d;    /* أغمق درجات الكحلي */
            --accent: #b6922e;          /* ذهبي مطفي فخم */
            --accent-soft: #fff9e6;     /* بيج ذهبي فاتح للخلفيات الصغيرة */
            --text: #102a43;            /* لون النص الأساسي */
            --muted: #627d98;           /* لون نصوص فرعية رمادي أزرق */
            --border: rgba(16, 42, 67, 0.1);
            --shadow: 0 20px 40px rgba(16, 42, 67, 0.15);
            --radius-xl: 26px;
            --radius-lg: 18px;
            
            /* ألوان الحالات (النتائج) */
            --success: #218358;         /* أخضر هادئ */
            --info: #1967d2;            /* أزرق معلوماتي */
            --kg: #8e44ad;              /* بنفسجي لمراحل الروضة */
            --secondary: #d97706;       /* برتقالي ذهبي للتعليم المستمر */
            --neutral: #486581;         /* رمادي أزرق */
            --danger: #9e1c1c;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(182, 146, 46, 0.15), transparent 30%),
                radial-gradient(circle at bottom left, rgba(16, 42, 67, 0.1), transparent 30%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            overflow-x: hidden;
        }

        .page {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 14px;
        }

        .app-shell {
            width: 100%;
            max-width: 560px;
            min-height: calc(100vh - 28px);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 22px;
            padding: 12px 18px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: #fff;
            box-shadow: var(--shadow);
            animation: fadeUp 0.8s ease both;
        }

        .hero h1 {
            margin: 0;
            font-size: 1.18rem;
            line-height: 1.8;
            font-weight: 800;
            text-align: center;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: var(--radius-xl);
            padding: 18px;
            box-shadow: var(--shadow);
            animation: fadeUp 0.85s ease both;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, rgba(16, 42, 67, 0.1), rgba(182, 146, 46, 0.15));
            color: var(--primary);
            flex-shrink: 0;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--primary);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 10px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.79rem;
            font-weight: 700;
            color: var(--primary);
            padding-right: 4px;
        }

        select {
            width: 100%;
            min-height: 48px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: #fff;
            color: var(--text);
            font-family: inherit;
            font-size: 0.96rem;
            font-weight: 600;
            padding: 0 10px;
            outline: none;
            transition: all 0.2s ease;
        }

        select:focus {
            border-color: var(--accent);
        }

        .actions { margin-top: 14px; }

        button {
            border: none;
            width: 100%;
            min-height: 52px;
            border-radius: 16px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform .18s ease, filter 0.2s;
        }

        button:active { transform: scale(0.98); }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 10px 20px rgba(16, 42, 67, 0.2);
        }

        .btn-calc {
            background: linear-gradient(135deg, var(--accent), #967825);
            color: #fff;
            box-shadow: 0 10px 20px rgba(182, 146, 46, 0.2);
        }

        .result-box {
            margin-top: 14px;
            display: none;
            border-radius: 18px;
            padding: 14px;
            background: var(--accent-soft);
            border: 1px solid rgba(182, 146, 46, 0.2);
            color: var(--primary);
            font-weight: 700;
            text-align: center;
        }

        .result-area { display: none; margin-top: 15px; }

        .stage {
            border-radius: 20px;
            padding: 22px 16px;
            color: #fff;
            text-align: center;
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: var(--primary);
        }

        .footer .name { font-weight: 800; font-size: 0.95rem; }
        .footer .version { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="app-shell">
            <section class="hero">
                <h1>حاسبة أعمار طلاب الصف الأول الابتدائي ورياض الأطفال للعام الدراسي 1448 هـ</h1>
            </section>

            <section class="card">
                <div class="card-header">
                    <div class="icon-wrap">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M8 2V5M16 2V5M3 9H21M5 4H19C20.1046 4 21 4.89543 21 6V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V6C3 4.89543 3.89543 4 5 4Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div><h2>محول التاريخ الهجري إلى الميلادي</h2></div>
                </div>

                <div class="input-row">
                    <div class="field"><label>اليوم</label><select id="hDay"></select></div>
                    <div class="field"><label>الشهر</label><select id="hMonth"></select></div>
                    <div class="field"><label>السنة</label><select id="hYear"></select></div>
                </div>

                <div class="actions">
                    <button class="btn-main" onclick="convertHijri()">تحويل التاريخ وإرسال للحاسبة</button>
                </div>
                <div id="hResult" class="result-box"></div>
            </section>

            <section class="card">
                <div class="card-header">
                    <div class="icon-wrap">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 14C15.3137 14 18 11.3137 18 8C18 4.68629 15.3137 2 12 2C8.68629 2 6 4.68629 6 8C6 11.3137 8 14 12 14Z" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M4 21C4.85038 18.1085 7.17792 16 12 16C16.8221 16 19.1496 18.1085 20 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div><h2>حاسبة الصف المستحق</h2></div>
                </div>

                <div class="input-row">
                    <div class="field"><label>اليوم</label><select id="gDay"></select></div>
                    <div class="field"><label>الشهر</label><select id="gMonth"></select></div>
                    <div class="field"><label>السنة</label><select id="gYear"></select></div>
                </div>

                <div class="actions">
                    <button class="btn-calc" onclick="calculate()">احسب الصف المستحق</button>
                </div>

                <div id="resultArea" class="result-area">
                    <div id="stageOutput" class="stage"></div>
                </div>
            </section>

            <div class="footer">
                <div class="name">تصميم أ. خالد محمد الحربي® 2026</div>
                <div class="version">0504509080 | allihaibi@gmail.com</div>
                <div class="version">Version 3.4 - إصدار 1447هـ</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

    <script>
        // ... (باقي الكود البرمجي كما هو في نسختك الأصلية لضمان عدم حدوث أخطاء في الحساب) ...
        const hijriMonths = ["محرم", "صفر", "ربيع الأول", "ربيع الآخر", "جمادى الأولى", "جمادى الآخرة", "رجب", "شعبان", "رمضان", "شوال", "ذو القعدة", "ذو الحجة"];
        const gregorianMonths = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

        window.onload = function () {
            const hDay = document.getElementById("hDay"), hMonth = document.getElementById("hMonth"), hYear = document.getElementById("hYear");
            const gDay = document.getElementById("gDay"), gMonth = document.getElementById("gMonth"), gYear = document.getElementById("gYear");

            for (let i = 1; i <= 30; i++) hDay.innerHTML += `<option value="${i}">${i}</option>`;
            hijriMonths.forEach((m, i) => hMonth.innerHTML += `<option value="${i+1}">${i+1} - ${m}</option>`);
            for (let i = 1446; i >= 1390; i--) hYear.innerHTML += `<option value="${i}">${i}</option>`;

            for (let i = 1; i <= 31; i++) gDay.innerHTML += `<option value="${i}">${i}</option>`;
            gregorianMonths.forEach((m, i) => gMonth.innerHTML += `<option value="${i+1}">${i+1} - ${m}</option>`);
            for (let i = 2027; i >= 1980; i--) gYear.innerHTML += `<option value="${i}">${i}</option>`;
        };

        function convertHijri() {
            const d = document.getElementById("hDay").value, m = document.getElementById("hMonth").value, y = document.getElementById("hYear").value;
            const date = moment(`${y}/${m}/${d}`, "iYYYY/iM/iD");
            if (!date.isValid()) return;
            document.getElementById("gDay").value = date.format("D");
            document.getElementById("gMonth").value = date.format("M");
            document.getElementById("gYear").value = date.format("YYYY");
            calculate();
        }

        function calculate() {
            const d = parseInt(document.getElementById("gDay").value), m = parseInt(document.getElementById("gMonth").value), y = parseInt(document.getElementById("gYear").value);
            const birth = new Date(y, m - 1, d);
            const target = new Date(2026, 7, 24); 

            let years = target.getFullYear() - birth.getFullYear();
            let months = target.getMonth() - birth.getMonth();
            let days = target.getDate() - birth.getDate();
            if (days < 0) { months--; days += 30; }
            if (months < 0) { years--; months += 12; }

            const stageOut = document.getElementById("stageOutput");
            document.getElementById("resultArea").style.display = "block";

            let text = "", color = "";

            if (years >= 6 && years <= 10) {
                text = "الصف الأول الابتدائي";
                color = "var(--success)";
            } else if (years > 10) {
                text = "يتم توجيه الطالب للتعليم المستمر";
                color = "var(--secondary)";
            } else if (years == 5) {
                 text = "الأول ابتدائي (بشرط الروضة) أو رياض أطفال (KG3)";
                 color = "var(--info)";
            } else if (years == 4) {
                text = "رياض الأطفال - المستوى الثاني (KG2)";
                color = "var(--kg)";
            } else if (years == 3) {
                text = "رياض الأطفال - المستوى الأول (KG1)";
                color = "var(--kg)";
            } else {
                text = "دون سن القبول";
                color = "var(--neutral)";
            }

            stageOut.style.background = color;
            stageOut.innerHTML = `<div style="font-size:1.2rem; font-weight:800">${text}</div>`;
        }
    </script>
</body>
</html>
